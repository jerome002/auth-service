name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: finflow_test
        ports:
          - 5432:5432
        # Wait for postgres to be ready before moving to 'steps'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Speeds up future runs
      
      - name: Install dependencies
        run: npm install

      - name: Generate RSA Keys for RS256
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.key 2048
          openssl rsa -in keys/private.key -pubout -out keys/public.key
        # This fixes the 'Missing private.key' error during tests by ensuring the keys exist in the CI environment.

      - name: Generate Prisma Client
        run: npx prisma generate
      
      - name: Run Migrations on Test DB
        run: npx prisma migrate reset --force 
        env:
          DATABASE_URL: postgresql://postgres:mypassword@localhost:5432/finflow_test
      
      - name: Run Tests
        run: npm test
        env:
          # We pass the same DB URL and a dummy secret for the test runner
          DATABASE_URL: postgresql://postgres:mypassword@localhost:5432/finflow_test
          NODE_ENV: test
          JWT_SECRET: "ci_testing_secret_only"